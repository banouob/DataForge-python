# DataForge - 車種轉換對應表
# 格式：原始車種=轉換後車種

# ========================================
# 客車類
# ========================================
小客車(含客、貨兩用)自用=自小客
小客車(含客、貨兩用)租賃車=租小客
小客車(含客、貨兩用)計程車=計程車

# ========================================
# 小貨車類
# ========================================
小貨車營業用=營小貨
小貨車自用=自小貨
小貨車租賃小貨車=租小貨

# ========================================
# 曳引車類
# ========================================
曳引車營業用=營業用曳引車
曳引車自用=自用曳引車

# ========================================
# 大貨車類
# ========================================
大貨車營業用=營業用大貨車
大貨車自用=自用大貨車

# ========================================
# 聯結車類
# ========================================
全聯結車營業用=營業用全聯結車
全聯結車自用=自用全聯結車

# ========================================
# 機車類
# ========================================
機車大型重型1(550C.C以上)=大型重機車
機車大型重型2(250-550C.C)=大型重機車
機車普通重型=普重機
機車普通輕型=輕機車

# ========================================
# 慢車類
# ========================================
慢車腳踏自行車=腳踏自行車
慢車微型電動二輪車=微型電動二輪車
慢車電動輔助自行車=電動輔助自行車

# ========================================
# 人類
# ========================================
人輔助代步器材=醫療代步車
人行人=行人
